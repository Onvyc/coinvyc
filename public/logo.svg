<svg xmlns="http://www.w3.org/2000/svg" width="680" height="200" viewBox="0 0 680 200" role="img" aria-label="CoinVyc logo">
  <defs>
    <!-- Gradiente icono -->
    <linearGradient id="gIcon" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F5C400"/>
      <stop offset="0.45" stop-color="#25C26E"/>
      <stop offset="1" stop-color="#1E66FF"/>
    </linearGradient>

    <!-- Gradiente texto -->
    <linearGradient id="gText" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#1E66FF"/>
      <stop offset="0.55" stop-color="#25C26E"/>
      <stop offset="1" stop-color="#14A85D"/>
    </linearGradient>
  </defs>

  <!-- ICONO -->
  <g transform="translate(0,20)">
    <circle cx="90" cy="90" r="78" fill="url(#gIcon)"/>

    <!-- Velas -->
    <g stroke="#FFFFFF" stroke-width="5" stroke-linecap="round" opacity="0.85">
      <line x1="58" y1="115" x2="58" y2="75"/>
      <line x1="78" y1="130" x2="78" y2="90"/>
      <line x1="98" y1="120" x2="98" y2="65"/>
      <line x1="118" y1="110" x2="118" y2="80"/>
      <line x1="138" y1="125" x2="138" y2="95"/>
    </g>

    <g fill="#FFFFFF" opacity="0.85">
      <rect x="50" y="90" width="14" height="25" rx="6"/>
      <rect x="70" y="105" width="14" height="25" rx="6"/>
      <rect x="90" y="80" width="14" height="40" rx="6"/>
      <rect x="110" y="92" width="14" height="18" rx="6"/>
      <rect x="130" y="105" width="14" height="20" rx="6"/>
    </g>

    <!-- Flecha -->
    <path d="M45 130 L85 105 L110 115 L150 75"
          fill="none"
          stroke="#FFFFFF"
          stroke-width="8"
          stroke-linecap="round"
          stroke-linejoin="round"/>

    <path d="M150 75 L145 93 L164 82 Z" fill="#FFFFFF"/>
  </g>

  <!-- TEXTO -->
  <text x="190" y="130"
        font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial"
        font-size="88"
        font-weight="600"
        letter-spacing="-1.5"
        fill="url(#gText)">
    CoinVyc
  </text>
</svg>
